name: CI — Build, Test & Docker

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Backend Lint & Unit Tests
  # ──────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-coverage
          path: Backend/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Backend E2E Tests
  # ──────────────────────────────────────────────────────────────────
  backend-e2e-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: Backend

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret-do-not-use-in-prod
      JWT_EXPIRES_IN: 1h
      MONGODB_URI: mongodb://localhost:27017/test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e -- --forceExit

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Frontend Lint, Type Check & Unit Tests
  # ──────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type checking
        run: npx tsc -b

      - name: Run unit tests
        run: npm run test

      - name: Build application
        run: npm run build

  # ──────────────────────────────────────────────────────────────────
  # Job 4: Docker Build (only on push to main/develop)
  # ──────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-e2e-tests, frontend-tests]
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false
          tags: easygenerator-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
