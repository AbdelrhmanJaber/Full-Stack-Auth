version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: easygenerator_mongodb
    restart: always
    ports:
      - "27017:27017" # Exposes MongoDB port locally for debugging if needed
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - easygenerator_network

  # NestJS Backend Application Service
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: easygenerator_backend
    restart: always
    ports:
      - "${PORT:-3000}:3000" # Maps the host port to container's port 3000
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Wire connection using the docker internal network bridge service hostname 'mongodb'
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy # Starts only after MongoDB is fully ready and healthy
    networks:
      - easygenerator_network

volumes:
  # Persistent volume for MongoDB data
  mongo_data:
    driver: local

networks:
  # Dedicated network bridge for secure container-to-container communication
  easygenerator_network:
    driver: bridge
